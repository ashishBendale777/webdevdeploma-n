<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Transform Functions Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    gap:30px;
    justify-content:center;
}

.box{
    width:180px;
    height:180px;
    background:steelblue;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
    transition:all 0.5s ease;
}

/* =========================
   TRANSFORM FUNCTIONS
========================= */

/* translate */
.translate:hover{
    transform:translate(50px,20px);
}

/* translateX */
.translateX:hover{
    transform:translateX(80px);
}

/* translateY */
.translateY:hover{
    transform:translateY(-50px);
}

/* scale */
.scale:hover{
    transform:scale(1.3);
}

/* scaleX */
.scaleX:hover{
    transform:scaleX(1.5);
}

/* scaleY */
.scaleY:hover{
    transform:scaleY(1.5);
}

/* rotate */
.rotate:hover{
    transform:rotate(180deg);
}

/* rotateX */
.rotateX:hover{
    transform:rotateX(180deg);
}

/* rotateY */
.rotateY:hover{
    transform:rotateY(180deg);
}

/* skew */
.skew:hover{
    transform:skew(20deg,10deg);
}

/* skewX */
.skewX:hover{
    transform:skewX(30deg);
}

/* skewY */
.skewY:hover{
    transform:skewY(30deg);
}

/* multiple transforms */
.combo:hover{
    transform:
        translateY(-20px)
        rotate(20deg)
        scale(1.2);
}

/* =========================
   ANIMATIONS
========================= */

.animateRotate{
    animation:spin 4s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.animateBounce{
    animation:bounce 1s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-25px);
    }
}

.animateScale{
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}
</style>
</head>
<body>

<h1>CSS Transform Functions + Hover + Animation Demo</h1>

<div class="container">

    <div class="box translate">translate()</div>

    <div class="box translateX">translateX()</div>

    <div class="box translateY">translateY()</div>

    <div class="box scale">scale()</div>

    <div class="box scaleX">scaleX()</div>

    <div class="box scaleY">scaleY()</div>

    <div class="box rotate">rotate()</div>

    <div class="box rotateX">rotateX()</div>

    <div class="box rotateY">rotateY()</div>

    <div class="box skew">skew()</div>

    <div class="box skewX">skewX()</div>

    <div class="box skewY">skewY()</div>

    <div class="box combo">Combined</div>

    <div class="box animateRotate">Spin</div>

    <div class="box animateBounce">Bounce</div>

    <div class="box animateScale">Pulse</div>

</div>

</body>
</html>
