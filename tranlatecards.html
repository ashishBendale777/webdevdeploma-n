<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-container {
            height: 80%;
            width: 80%;
            display: flex;
            justify-content: space-between;
        }

        .card-item {
            height: 90%;
            width: 300px;
            overflow: hidden;
            position: relative;
            background-color: red;
            &:hover .caption-box {
                transform: translateY(0);
            }
        }

        .card-item .caption-box {
            width: 100%;
            height: 80px;
            position: absolute;
            bottom: 0;
            transition: all 0.6s ease-in;
            transform: translateY(80px);
            background-color: green;
        }
    </style>
</head>

<body>

    <div class="card-container">
        <div class="card-item">
            <h1>1</h1>
            <div class="caption-box">
                <p>Lorem iquam dolorem, </p>
            </div>
        </div>

        <div class="card-item">
            <h1>1</h1>

</body>

</html>
