<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            height: 100vh;
            width: 100vw;
        }

        .grid-container{
            height: 80%;
            width: 80%;
            padding: 4px;
            display: grid;
            gap: 12px;
            grid-template-columns: 2fr 1fr 2fr 100px;
            grid-template-rows: 1fr 1fr 100px;
        }

        .grid-item{
            background-color: green;
        }
    </style>
</head>

</html>
