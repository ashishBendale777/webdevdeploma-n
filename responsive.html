<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>

    <style>
        /* Reset default spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* =========================
       SECTION 1 - HOME BANNER
    ========================= */
        .banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 50px;
            background: #f4f4f4;
            gap: 30px;
        }

        .banner-text {
            flex: 1;
        }

        .banner-text h1 {
            margin-bottom: 15px;
        }

        .banner-text p {
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .banner-text button {
            padding: 10px 20px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .banner-image {
            flex: 1;
        }

        .banner-image img {
            width: 100%;
            border-radius: 10px;
        }

        /* =========================
       SECTION 2 - CARDS
    ========================= */
        .cards-section {
            padding: 50px;
        }

        .cards-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1 1 220px;
            background: #eeeeee;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
        }

        /* =========================
       RESPONSIVE DESIGN
    ========================= */
        @media screen and (max-width: 768px) {

            /* Stack banner content vertically */
            .banner {
                flex-direction: column;
                text-align: center;
                padding: 30px;
            }

            /* Stack cards */
            .cards-container {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <!-- ======================
         SECTION 1 - BANNER
    ======================= -->
    <section class="banner">

        <!-- Left Side Content -->
        <div class="banner-text">
            <h1>Welcome to My Website</h1>
            <p>
                This is a simple responsive home banner.
                The text appears on the left and the image
                appears on the right.
            </p>
            <button>Learn More</button>
        </div>

        <!-- Right Side Image -->
        <div class="banner-image">
            <img src="./images/stock photos/hime.jpg" alt="Banner Image">
        </div>

    </section>

    <!-- ======================
         SECTION 2 - CARDS
    ======================= -->
    <section class="cards-section">

        <div class="cards-container">

            <div class="card">
                <h3>Card 1</h3>
                <p>Simple card content.</p>
            </div>

            <div class="card">
                <h3>Card 2</h3>
                <p>Simple card content.</p>
            </div>

            <div class="card">
                <h3>Card 3</h3>
                <p>Simple card content.</p>
            </div>

            <div class="card">
                <h3>Card 4</h3>
                <p>Simple card content.</p>
            </div>

        </div>

    </section>

</body>

</html>
